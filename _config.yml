# Jekyll config for GitHub Pages.
#
# When this folder (`docs/`) is set as the GH Pages source, Jekyll
# will only build the files listed below. Everything else in this
# folder (plans, store-listing drafts, superpowers, etc.) is kept
# off the public site via the `exclude` list — they are internal.
#
# To enable Pages: GitHub repo → Settings → Pages → Source =
# "Deploy from a branch", Branch = main, Folder = /docs.

title: Anima
description: A local-first trading app — give something good, get something good.
url: ""

# Use the lightest-weight theme; we only have static markdown pages.
theme: minima

# Hide everything that isn't a public artifact.
exclude:
  - plans
  - store-listing
  - superpowers
  - README.md
  - "*.draft.md"
